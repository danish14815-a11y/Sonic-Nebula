<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D1B4E"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#gloss)"/>
  <rect width="124" height="124" x="2" y="2" rx="26" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <g filter="url(#glow)">
    <rect x="38" y="50" width="8" height="28" rx="4" fill="#00FFFF" opacity="0.9"/>
    <rect x="56" y="38" width="8" height="52" rx="4" fill="#A855F7" opacity="0.95"/>
    <rect x="74" y="55" width="8" height="18" rx="4" fill="#00D4FF" opacity="0.85"/>
  </g>
</svg>